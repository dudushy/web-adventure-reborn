<header>
  <a id="title" href="https://github.com/dudushy/web-adventure-reborn" target="_blank">
    <img src="assets/imgs/logo.svg" alt="Web Adventure Reborn Logo" />

    WAR
  </a>

  <nav>
    @for (route of navRoutes; track $index) {
    <a [routerLink]="route.path" routerLinkActive="active">{{ route.path + '.title' | translate }}</a>
    }
  </nav>
</header>

<main>
  <router-outlet />
</main>

<footer>
  <h2>
    {{ 'app.footer_made_with' | translate }}

    <span id="heart">&#10084;</span>

    {{ 'app.footer_by' | translate }}

    <a href="https://github.com/dudushy" target="_blank">dudushy</a>
  </h2>
</footer>
