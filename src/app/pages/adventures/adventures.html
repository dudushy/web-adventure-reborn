<div class="container">
  <div class="adventures">
    @for (adventure of adventures; track $index) {
      <a class="adventure" [routerLink]="adventure.path" [ngClass]="adventure.category">
        <div class="slug-and-id">
          <span class="slug">{{ adventure.slug }}</span>

          <span class="id">#{{ $index }}</span>
        </div>

        <div class="description">
          <p>{{ adventure.descriptionKey | translate }}</p>
        </div>

        <div class="status-and-category">
          <shy-icon class="status" [ngClass]="adventure.status">{{ getStatusIcon(adventure.status) }}</shy-icon>

          <span class="category">{{ adventure.category }}</span>
        </div>
      </a>
    }
  </div>
</div>
