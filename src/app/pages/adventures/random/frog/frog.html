<button (click)="catchFly()" [disabled]="frogState === 'catching' || frogState === 'caught'">
  {{ (frogState === 'finished' ? 'adventures.random.frog.restart' : 'adventures.random.frog.toggle') | translate }}
</button>

<div class="canvas">
  <div class="frog" [style.--frog-rotation]="frogRotation" [style.--frog-transition-duration]="frogTransitionDuration" [class.tongue]="frogTongue">
    <div class="head"></div>

    <div class="tongue">
      <div class="tongue-tip"></div>
    </div>

    <div class="eye left">
      <div class="eye-ball">
        <div class="eye-pupil"></div>
      </div>
    </div>

    <div class="eye right">
      <div class="eye-ball">
        <div class="eye-pupil"></div>
      </div>
    </div>

    <div class="body">
      <div class="arm left">
        <div class="section">
          <div class="finger finger-1">
            <div class="finger-tip"></div>
          </div>

          <div class="finger finger-2">
            <div class="finger-tip"></div>
          </div>

          <div class="finger finger-3">
            <div class="finger-tip"></div>
          </div>
        </div>
      </div>

      <div class="arm right">
        <div class="section">
          <div class="finger finger-1">
            <div class="finger-tip"></div>
          </div>

          <div class="finger finger-2">
            <div class="finger-tip"></div>
          </div>

          <div class="finger finger-3">
            <div class="finger-tip"></div>
          </div>
        </div>
      </div>

      <div class="leg left">
        <div class="section section-1">
          <div class="section section-2">
            <div class="finger finger-1">
              <div class="finger-tip"></div>
            </div>

            <div class="finger finger-2">
              <div class="finger-tip"></div>
            </div>

            <div class="finger finger-3">
              <div class="finger-tip"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="leg right">
        <div class="section section-1">
          <div class="section section-2">
            <div class="finger finger-1">
              <div class="finger-tip"></div>
            </div>

            <div class="finger finger-2">
              <div class="finger-tip"></div>
            </div>

            <div class="finger finger-3">
              <div class="finger-tip"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="fly" [style.--fly-vertical-position]="flyVerticalPosition" [style.--fly-horizontal-position]="flyHorizontalPosition" [style.--fly-transition-duration]="flyTransitionDuration">
    <div class="body"></div>

    <div class="wing left"></div>

    <div class="wing right"></div>
  </div>

  <!-- <div class="debug" [style.--debug-position-x]="debugHorizontalPosition" [style.--debug-position-y]="debugVerticalPosition"></div> -->
</div>
