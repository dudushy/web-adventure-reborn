<section class="showcase">
  <h2>war-select</h2>
  <p class="subtitle">Componente de select customizavel com HTML e CSS puro, usando variaveis CSS.</p>

  <div class="controls">
    <button type="button" class="toggle-button" (click)="toggleDisabled()">
      {{ isDisabled ? 'Habilitar select' : 'Desabilitar select' }}
    </button>
    <p class="selected">
      Valor selecionado: <strong>{{ selectedOption || 'nenhum' }}</strong>
    </p>
  </div>

  <div class="examples">
    <article class="example-card">
      <h3>Padrao</h3>
      <war-select [selectOptions]="optionArray" (selectionChange)="updateOption($event)" [selectIcon]="'check'" [dropdownIcon]="'chevron-down'" [(ngModel)]="selectedOption" [disabled]="isDisabled" />
    </article>

    <article class="example-card">
      <h3>Customizado por variaveis</h3>
      <war-select class="custom-skin icon option-icon" [selectOptions]="optionArray" [selectIcon]="'ok'" [dropdownIcon]="'v'" (selectionChange)="updateOption($event)" [(ngModel)]="selectedOption" [disabled]="isDisabled" />
    </article>
  </div>
</section>
